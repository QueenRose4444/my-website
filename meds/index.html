<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/png" href="/images/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
    <link rel="shortcut icon" href="/images/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="RoseStuffs" />
    <link rel="manifest" href="/images/site.webmanifest" />
    <title>Mounjaro & Weight Tracker - Track Doses, Weight & Meds | Ozempic | Mounjaro</title>
    <meta name="description"
        content="A free, private medication tracker for Mounjaro, Ozempic, and weight loss. Log doses, track pens and supply, estimate medication levels, and visualise your progress.">
    <meta name="theme-color" content="#08090b">

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;450;500;600&family=Geist+Mono:wght@400;450;500&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="meds.css?v=20260711c">
    <link rel="canonical" href="https://rosestuffs.org/meds/" />
</head>

<body>
    <!-- ============================================================
         SITE TOP BAR — matches the rest of rosestuffs.org.
         APK NOTE: delete everything between SITE-TOPBAR-START and
         SITE-TOPBAR-END (and the auth buttons move into Settings)
         when packaging the mobile app.
         SITE-TOPBAR-START -->
    <header class="top-bar" id="siteTopBar">
        <nav class="nav-container">
            <div class="nav-left">
                <ul class="nav-links">
                    <li><a href="../home/">Home</a></li>
                    <li><a href="./" class="active-link">Meds</a></li>
                </ul>
            </div>
            <div class="nav-center">
                <a href="https://github.com/QueenRose4444/my-website" data-repo-link target="_blank" rel="noopener">
                    <img src="/images/github-mark-white_logo.png" alt="GitHub" class="github-icon">
                </a>
            </div>
            <div class="nav-right">
                <div class="user-account">
                    <span id="userStatus">Local only</span>
                    <button id="loginButton">Login</button>
                    <button id="registerButton">Register</button>
                    <button id="logoutButton" style="display:none;">Logout</button>
                </div>
            </div>
        </nav>
    </header>
    <!-- SITE-TOPBAR-END ============================================ -->

    <div class="app">
        <header class="topbar app-topbar">
            <div class="brand"><span class="brand-dot"></span><span>meds</span></div>
            <nav class="nav desktop-nav">
                <button data-page="dashboard" class="active">Dashboard</button>
                <button data-page="history">History</button>
                <button data-page="calendar">Calendar</button>
                <button data-page="meds">Meds</button>
            </nav>
            <div class="topbar-spacer"></div>
            <div class="topbar-right">
                <span id="syncDot" class="sync-dot local"></span>
                <button class="icon-btn" id="themeBtn" title="Toggle theme">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                </button>
                <button class="icon-btn" id="settingsBtn" title="Settings">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09A1.65 1.65 0 0 0 15 4.6a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                </button>
            </div>
        </header>

        <main class="main" id="appMain"></main>

        <!-- mobile bottom navigation -->
        <nav class="bottom-nav">
            <button data-page="dashboard" class="active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg>
                <span>Home</span>
            </button>
            <button data-page="history">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v5h5"/><path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"/><path d="M12 7v5l4 2"/></svg>
                <span>History</span>
            </button>
            <button id="navLog" class="nav-log" aria-label="Log a dose or weight">
                <span class="nav-log-circle">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
                </span>
                <span>Log</span>
            </button>
            <button data-page="meds">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"/><path d="m8.5 8.5 7 7"/></svg>
                <span>Meds</span>
            </button>
            <button id="settingsBtnMobile">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09A1.65 1.65 0 0 0 15 4.6a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                <span>Settings</span>
            </button>
        </nav>
    </div>

    <!-- shared site auth (AuthManager) -->
    <script src="/auth.js?v=20260711c"></script>

    <!-- CACHE-BUSTING: bump ?v= (and the meds.css one above) on every deploy
         so phones stop serving stale cached JS (old presets, old fixes) -->
    <script src="js/data.js?v=20260711c"></script>
    <script src="js/store.js?v=20260711c"></script>
    <script src="js/ui.js?v=20260711c"></script>
    <script src="js/charts.js?v=20260711c"></script>
    <script src="js/views.js?v=20260711c"></script>
    <script src="js/modals.js?v=20260711c"></script>
    <script src="js/onboarding.js?v=20260711c"></script>
    <script src="js/app.js?v=20260711c"></script>
    <script src="js/push.js?v=20260711c"></script>
</body>

</html>
