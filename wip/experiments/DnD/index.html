<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tabletop — D&D</title>
  <link rel="stylesheet" href="css/dnd.css" />
</head>
<body data-page="dashboard">
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">d20</span>
      <span class="brand-name">Tabletop</span>
    </div>
    <nav class="topnav">
      <span id="userChip" class="user-chip hidden"></span>
      <button id="btnLogout" class="btn ghost hidden">Log out</button>
      <button id="btnLogin" class="btn">Log in</button>
    </nav>
  </header>

  <main class="wrap">
    <section id="signedOutHero" class="hero">
      <h1>Run your table, live.</h1>
      <p>Create a lobby, send your players an invite code, and play D&amp;D in the browser: character sheets, dice, maps, tokens, whispers, and DM notes.</p>
      <button id="btnHeroLogin" class="btn primary">Get started</button>
    </section>

    <section id="dashboard" class="hidden">
      <div class="row between">
        <h2>Your campaigns</h2>
        <div class="row gap">
          <button id="btnJoin" class="btn">Join by code</button>
          <button id="btnCreate" class="btn primary">New campaign</button>
          <a href="character.html" class="btn ghost">Character library</a>
        </div>
      </div>
      <div id="campaignList" class="card-grid">
        <div class="empty">Loading…</div>
      </div>
    </section>
  </main>

  <!-- Login / register modal -->
  <div id="authModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-card">
      <div class="tabs">
        <button class="tab active" data-tab="login">Log in</button>
        <button class="tab" data-tab="register">Register</button>
      </div>
      <form id="loginForm" class="stack">
        <label>Username<input name="username" autocomplete="username" required /></label>
        <label>Password<input name="password" type="password" autocomplete="current-password" required /></label>
        <div class="error" data-role="error"></div>
        <button class="btn primary">Log in</button>
      </form>
      <form id="registerForm" class="stack hidden">
        <label>Username<input name="username" autocomplete="username" required /></label>
        <label>Password<input name="password" type="password" autocomplete="new-password" required minlength="6" /></label>
        <div class="error" data-role="error"></div>
        <button class="btn primary">Register</button>
      </form>
      <button class="modal-close" data-close>×</button>
    </div>
  </div>

  <!-- Create campaign modal -->
  <div id="createModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-card">
      <h3>New campaign</h3>
      <form id="createForm" class="stack">
        <label>Name<input name="name" required maxlength="120" /></label>
        <label>Description<textarea name="description" rows="3" maxlength="2000"></textarea></label>
        <label>Optional password<input name="password" type="password" autocomplete="new-password" placeholder="leave blank for open join" /></label>
        <div class="error" data-role="error"></div>
        <div class="row end gap">
          <button type="button" class="btn ghost" data-close>Cancel</button>
          <button class="btn primary">Create</button>
        </div>
      </form>
      <button class="modal-close" data-close>×</button>
    </div>
  </div>

  <!-- Join campaign modal -->
  <div id="joinModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-card">
      <h3>Join a campaign</h3>
      <form id="joinForm" class="stack">
        <label>Invite code<input name="inviteCode" required maxlength="8" style="text-transform:uppercase" /></label>
        <label>Password (if any)<input name="password" type="password" autocomplete="off" /></label>
        <div class="error" data-role="error"></div>
        <div class="row end gap">
          <button type="button" class="btn ghost" data-close>Cancel</button>
          <button class="btn primary">Join</button>
        </div>
      </form>
      <button class="modal-close" data-close>×</button>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="../../../auth.js"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
